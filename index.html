<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clasificador Fashion MNIST</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Roboto, "Segoe UI", Arial, Helvetica, sans-serif;
      --primary: #006d3f;
      --on-primary: #ffffff;
      --primary-container: #a8f5c8;
      --on-primary-container: #002111;
      --secondary-container: #d8e8dc;
      --surface: #fbfdf8;
      --surface-container: #eff6ee;
      --surface-container-high: #e7f0e6;
      --outline: #d8e4d6;
      --text: #172018;
      --muted: #4f5f52;
      --success: #1d7d47;
      --danger: #b3261e;
      --border-soft: #d7e5d6;
      --canvas-border: #d1d5db;
      color: var(--text);
      background: #f2f8f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    main {
      width: min(1040px, 100%);
      max-height: calc(100vh - 56px);
      display: grid;
      grid-template-columns: minmax(390px, 440px) 1fr;
      gap: 18px;
      align-items: stretch;
      animation: pageIn 520ms ease both;
    }

    section {
      min-height: 0;
      background: color-mix(in srgb, var(--surface) 86%, white);
      border: 1px solid var(--border-soft);
      border-radius: 28px;
      padding: 22px;
      overflow: hidden;
    }

    .input-panel {
      display: grid;
      gap: 16px;
    }

    .panel-heading {
      display: grid;
      gap: 5px;
    }

    .eyebrow {
      margin: 0;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      height: auto;
      display: block;
      border: 1px solid var(--canvas-border);
      border-radius: 22px;
      background: #ffffff;
      cursor: crosshair;
      touch-action: none;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    canvas:active {
      transform: scale(0.992);
      border-color: var(--primary);
    }

    .tools {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button, label.file-button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 650;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 0;
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease, opacity 150ms ease;
      user-select: none;
    }

    button:hover:not(:disabled), label.file-button:hover {
      transform: translateY(-1px);
    }

    button:active:not(:disabled), label.file-button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.58;
      cursor: wait;
    }

    .primary {
      background: var(--primary);
      color: var(--on-primary);
    }

    .secondary, label.file-button {
      background: var(--secondary-container);
      color: var(--on-primary-container);
      border-color: rgba(0, 109, 63, 0.12);
    }

    input[type="file"] {
      display: none;
    }

    .status {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
    }

    .result-panel {
      min-height: 0;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result {
      flex: 1;
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 9px;
      overflow: auto;
      padding-right: 2px;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .result-cover {
      height: 100%;
      min-height: 280px;
      display: grid;
      gap: 14px;
      place-items: center;
      padding: 18px;
      text-align: center;
      animation: softSwap 360ms ease both;
    }

    .result-cover img {
      width: min(78%, 360px);
      max-height: 310px;
      object-fit: contain;
      opacity: 0.92;
    }

    .empty-result-text {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .prediction {
      display: grid;
      grid-template-columns: minmax(92px, 120px) 1fr 58px;
      gap: 12px;
      align-items: center;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 16px;
      background: var(--surface-container);
      font-size: 14px;
      animation: rowIn 360ms ease both;
    }

    .prediction strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: rgba(0, 109, 63, 0.14);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--primary);
      border-radius: inherit;
      animation: fillBar 620ms cubic-bezier(.2, 0, 0, 1) both;
    }

    .percent {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .spinner {
      display: inline-flex;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 109, 63, 0.18);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    .skeleton {
      position: relative;
      overflow: hidden;
      background: var(--surface-container-high);
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: rgba(255, 255, 255, 0.45);
      animation: shimmer 1.25s infinite;
    }

    .skeleton-row {
      display: grid;
      grid-template-columns: minmax(92px, 120px) 1fr 58px;
      gap: 12px;
      align-items: center;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 16px;
      background: var(--surface-container);
    }

    .skeleton-text, .skeleton-bar, .skeleton-num {
      height: 12px;
      border-radius: 999px;
    }

    .skeleton-bar {
      height: 9px;
    }

    .skeleton-num {
      width: 44px;
      justify-self: end;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes softSwap {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fillBar {
      from { transform: scaleX(0); transform-origin: left; }
      to { transform: scaleX(1); transform-origin: left; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 760px) {
      body {
        height: auto;
        min-height: 100vh;
        overflow: auto;
        padding: 16px;
        place-items: start center;
      }

      main {
        grid-template-columns: 1fr;
        align-items: start;
      }

      section {
        border-radius: 22px;
        padding: 18px;
      }

      h1 {
        font-size: 24px;
      }

      .prediction, .skeleton-row {
        grid-template-columns: 88px 1fr 52px;
        gap: 9px;
        font-size: 13px;
      }

      .result-panel {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="input-panel">
      <div class="panel-heading">
        <p class="eyebrow">Fashion MNIST</p>
        <h1>Clasificador de ropa</h1>
      </div>
      <canvas id="drawCanvas" width="280" height="280"></canvas>
      <div class="tools">
        <button id="classifyButton" class="primary" disabled>Clasificar</button>
        <button id="clearButton" class="secondary">Limpiar</button>
        <label class="file-button" for="imageInput">Subir imagen</label>
        <input id="imageInput" type="file" accept="image/*">
      </div>
      <div id="status" class="status">Cargando modelo...</div>
    </section>

    <section class="result-panel">
      <h2>Resultado</h2>
      <div id="results" class="result"></div>
    </section>
  </main>

  <script>
    const CLASSES = [
      'Camiseta/top', 'Pantalon', 'Sueter', 'Vestido', 'Abrigo',
      'Sandalia', 'Camisa', 'Tenis', 'Bolso', 'Botin'
    ];

    const MODEL_URL = './tfjs_target_dir/model.json';
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const classifyButton = document.getElementById('classifyButton');
    const clearButton = document.getElementById('clearButton');
    const imageInput = document.getElementById('imageInput');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    let model = null;
    let drawing = false;
    let hasDrawing = false;

    function setStatus(text, loading = false) {
      statusEl.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
    }

    function renderSkeleton(rows = 6) {
      resultsEl.innerHTML = Array.from({ length: rows }, () => `
        <div class="skeleton-row">
          <span class="skeleton skeleton-text"></span>
          <span class="skeleton skeleton-bar"></span>
          <span class="skeleton skeleton-num"></span>
        </div>
      `).join('');
    }

    function renderCover() {
      resultsEl.innerHTML = `
        <div class="result-cover">
          <img src="./assets/cover.svg" alt="">
          <p class="empty-result-text">Sin resultados. Sube una imagen o dibujala pa empezar.</p>
        </div>
      `;
    }

    function clearCanvas() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      hasDrawing = false;
      renderCover();
      setStatus(model ? 'Dibuja o sube una imagen.' : 'Cargando modelo...', !model);
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const pointer = event.touches ? event.touches[0] : event;
      return {
        x: (pointer.clientX - rect.left) * canvas.width / rect.width,
        y: (pointer.clientY - rect.top) * canvas.height / rect.height
      };
    }

    function startDrawing(event) {
      event.preventDefault();
      drawing = true;
      hasDrawing = true;
      const point = getPoint(event);
      ctx.beginPath();
      ctx.moveTo(point.x, point.y);
    }

    function draw(event) {
      if (!drawing) return;
      event.preventDefault();
      const point = getPoint(event);
      ctx.lineTo(point.x, point.y);
      ctx.stroke();
    }

    function stopDrawing(event) {
      if (event) event.preventDefault();
      drawing = false;
    }

    function prepareCanvas() {
      clearCanvas();
      ctx.strokeStyle = '#111111';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }

    function preprocessImage() {
      return tf.tidy(() => {
        const image = tf.browser.fromPixels(canvas, 1);
        const resized = tf.image.resizeBilinear(image, [28, 28]);
        return tf.sub(1, resized.toFloat().div(255)).reshape([1, 28, 28, 1]);
      });
    }

    function renderResults(predictions) {
      const ranked = Array.from(predictions)
        .map((value, index) => ({ label: CLASSES[index], value }))
        .sort((a, b) => b.value - a.value);

      resultsEl.innerHTML = ranked.map(item => {
        const percent = item.value * 100;
        return `
          <div class="prediction">
            <strong>${item.label}</strong>
            <div class="bar"><span style="width:${percent.toFixed(2)}%"></span></div>
            <span class="percent">${percent.toFixed(1)}%</span>
          </div>
        `;
      }).join('');
    }

    async function classify() {
      if (!model) {
        setStatus('El modelo todavia no esta listo.');
        return;
      }

      if (!hasDrawing) {
        setStatus('Primero dibuja o sube una imagen.');
        return;
      }

      classifyButton.disabled = true;
      setStatus('Clasificando...', true);
      renderSkeleton(10);

      await tf.nextFrame();
      const input = preprocessImage();
      const output = model.predict(input);
      const predictions = await output.data();

      input.dispose();
      output.dispose();

      renderResults(predictions);
      setStatus(`<strong>Prediccion: ${CLASSES[predictions.indexOf(Math.max(...predictions))]}</strong>`);
      classifyButton.disabled = false;
    }

    function loadUploadedImage(file) {
      const image = new Image();
      image.onload = () => {
        clearCanvas();
        const scale = Math.min(canvas.width / image.width, canvas.height / image.height);
        const width = image.width * scale;
        const height = image.height * scale;
        const x = (canvas.width - width) / 2;
        const y = (canvas.height - height) / 2;
        ctx.drawImage(image, x, y, width, height);
        hasDrawing = true;
        setStatus('Imagen lista para clasificar.');
      };
      image.src = URL.createObjectURL(file);
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);
    classifyButton.addEventListener('click', classify);
    clearButton.addEventListener('click', clearCanvas);
    imageInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (file) loadUploadedImage(file);
    });

    async function init() {
      prepareCanvas();
      renderSkeleton();

      try {
        if (!window.tf) {
          throw new Error('No se cargo TensorFlow.js. Revisa tu conexion o descarga tf.min.js localmente.');
        }

        model = await tf.loadLayersModel(MODEL_URL);
        classifyButton.disabled = false;
        renderCover();
        setStatus('Modelo cargado. Dibuja o sube una imagen.');
      } catch (error) {
        resultsEl.innerHTML = '';
        setStatus(`No se pudo cargar el modelo: ${error.message}`);
        console.error(error);
      }
    }

    init();
  </script>
</body>
</html>
